{% extends "base.html" %}

{% block title %}Add Event — EventApp{% endblock %}

{% block content %}
<div class="main-content">
    <div class="page-header">
        <h1>Create New Event ➕</h1>
        <p>Fill in the details to publish a new event</p>
    </div>

    <div class="form-container">
        <div class="card" style="padding: 2rem;">
            <form method="POST">
                <div class="form-group">
                    <label for="title">Event Title</label>
                    <input type="text" name="title" id="title" class="form-control" placeholder="e.g. HackFusion 2026"
                        required>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea name="description" id="description" class="form-control"
                        placeholder="Describe the event, rules, prizes..."></textarea>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select name="category" id="category" class="form-control" required>
                        <option value="">— Select Category —</option>
                        <option value="Hackathon">Hackathon</option>
                        <option value="Workshop">Workshop</option>
                        <option value="Seminar">Seminar</option>
                        <option value="Web Development">Web Development</option>
                        <option value="AI / ML">AI / ML</option>
                        <option value="IoT">IoT</option>
                        <option value="Cybersecurity">Cybersecurity</option>
                        <option value="General">General</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="mode">Mode</label>
                    <select name="mode" id="mode" class="form-control">
                        <option value="online">Online</option>
                        <option value="offline">Offline</option>
                        <option value="hybrid">Hybrid</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="event_datetime">Date &amp; Time</label>
                    <input type="datetime-local" name="event_datetime" id="event_datetime" class="form-control"
                        required>
                </div>

                <div class="form-group">
                    <label for="team_size">Team Size</label>
                    <input type="number" name="team_size" id="team_size" class="form-control" min="1" value="1"
                        required>
                </div>

                <div class="flex gap-1" style="margin-top:1.5rem;">
                    <button type="submit" class="btn btn-primary">🚀 Create Event</button>
                    <a href="{{ url_for('admin.admin_dashboard') }}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
