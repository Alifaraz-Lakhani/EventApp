{% extends "base.html" %}

{% block title %}Edit Event — EventApp{% endblock %}

{% block content %}
<div class="main-content">
    <div class="page-header">
        <h1>Edit Event ✏️</h1>
        <p>Update the details for this event</p>
    </div>

    <div class="form-container">
        <div class="card" style="padding: 2rem;">
            <form method="POST">
                <div class="form-group">
                    <label for="title">Event Title</label>
                    <input type="text" name="title" id="title" class="form-control" value="{{ event[1] }}" required>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea name="description" id="description" class="form-control">{{ event[2] }}</textarea>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select name="category" id="category" class="form-control" required>
                        <option value="Hackathon" {% if event[3]=='Hackathon' %}selected{% endif %}>Hackathon</option>
                        <option value="Workshop" {% if event[3]=='Workshop' %}selected{% endif %}>Workshop</option>
                        <option value="Seminar" {% if event[3]=='Seminar' %}selected{% endif %}>Seminar</option>
                        <option value="Web Development" {% if event[3]=='Web Development' %}selected{% endif %}>Web
                            Development</option>
                        <option value="AI / ML" {% if event[3]=='AI / ML' %}selected{% endif %}>AI / ML</option>
                        <option value="IoT" {% if event[3]=='IoT' %}selected{% endif %}>IoT</option>
                        <option value="Cybersecurity" {% if event[3]=='Cybersecurity' %}selected{% endif %}>
                            Cybersecurity</option>
                        <option value="General" {% if event[3]=='General' %}selected{% endif %}>General</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="mode">Mode</label>
                    <select name="mode" id="mode" class="form-control">
                        <option value="online" {% if event[4]=='online' %}selected{% endif %}>Online</option>
                        <option value="offline" {% if event[4]=='offline' %}selected{% endif %}>Offline</option>
                        <option value="hybrid" {% if event[4]=='hybrid' %}selected{% endif %}>Hybrid</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="event_datetime">Date &amp; Time</label>
                    <input type="datetime-local" name="event_datetime" id="event_datetime" class="form-control"
                        value="{{ event[5].strftime('%Y-%m-%dT%H:%M') }}" required>
                </div>

                <div class="form-group">
                    <label for="team_size">Team Size</label>
                    <input type="number" name="team_size" id="team_size" class="form-control" value="{{ event[6] }}"
                        min="1" required>
                </div>

                <div class="flex gap-1" style="margin-top:1.5rem;">
                    <button type="submit" class="btn btn-primary">💾 Update Event</button>
                    <a href="{{ url_for('admin.admin_dashboard') }}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
